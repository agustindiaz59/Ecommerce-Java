<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechStore</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            border: none;
            border-radius: 24px;
            overflow: hidden;
            background-color: white;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background-color: #0d6efd;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            font-size: 2rem;
            box-shadow: 0 10px 30px rgba(13, 110, 253, 0.25);
        }

        .form-control {
            height: 52px;
            border-radius: 12px;
        }

        .btn-login {
            height: 52px;
            border-radius: 12px;
            font-weight: 600;
        }

        .social-btn {
            border-radius: 12px;
            height: 48px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #6c757d;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #dee2e6;
        }

        .divider:not(:empty)::before {
            margin-right: .75em;
        }

        .divider:not(:empty)::after {
            margin-left: .75em;
        }

        .login-hero {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .login-footer a {
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .input-group-text {
            border-radius: 12px 0 0 12px;
        }

        .input-group .form-control {
            border-radius: 0 12px 12px 0;
        }
    </style>
</head>
<body>

<div class="card shadow-lg login-card">

    <!-- HEADER -->
    <div class="login-hero">

        <div class="brand-logo">
            <i class="bi bi-bag-fill"></i>
        </div>

        <h2 class="fw-bold mb-2">
            Bienvenido a TechStore
        </h2>

        <p class="mb-0 opacity-75">
            Iniciá sesión para continuar comprando.
        </p>

    </div>

    <!-- BODY -->
    <div class="card-body p-4 p-md-5">

        <!-- FORM -->
        <form>

            <!-- EMAIL -->
            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Correo electrónico
                </label>

                <div class="input-group">

                    <span class="input-group-text bg-light">
                        <i class="bi bi-envelope"></i>
                    </span>

                    <input type="email"
                           class="form-control"
                           placeholder="nombre@correo.com">

                </div>

            </div>

            <!-- PASSWORD -->
            <div class="mb-3">

                <label class="form-label fw-semibold">
                    Contraseña
                </label>

                <div class="input-group">

                    <span class="input-group-text bg-light">
                        <i class="bi bi-lock"></i>
                    </span>

                    <input type="password"
                           class="form-control"
                           placeholder="Ingresá tu contraseña">

                </div>

            </div>

            <!-- OPTIONS -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <div class="form-check">

                    <input class="form-check-input"
                           type="checkbox"
                           id="remember">

                    <label class="form-check-label"
                           for="remember">

                        Recordarme

                    </label>

                </div>

                <a href="#" class="text-decoration-none">
                    ¿Olvidaste tu contraseña?
                </a>

            </div>

            <!-- LOGIN BUTTON -->
            <button type="submit"
                    class="btn btn-primary btn-login w-100 shadow-sm">

                <i class="bi bi-box-arrow-in-right"></i>
                Iniciar sesión

            </button>

        </form>

        <!-- DIVIDER -->
        <div class="divider">
            o continuar con
        </div>

        <!-- SOCIAL LOGIN -->
        <div class="d-grid gap-3">

            <button class="btn btn-outline-dark social-btn">
                <i class="bi bi-google"></i>
                Continuar con Google
            </button>

            <button class="btn btn-outline-primary social-btn">
                <i class="bi bi-facebook"></i>
                Continuar con Facebook
            </button>

        </div>

        <!-- REGISTER -->
        <div class="text-center mt-4 login-footer">

            <span class="text-muted">
                ¿No tenés una cuenta?
            </span>

            <a href="#" class="fw-semibold">
                Registrarse
            </a>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
